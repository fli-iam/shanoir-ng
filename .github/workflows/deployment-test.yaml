# Test that the Shanoir NG docker-compose deployment starts correctly.
#
# This workflow uses pre-built images from GHCR through docker-compose.yml
# and follows the bootstrap.sh initialization sequence without building
# application images from source.
#
# It is a fresh-install smoke test only. It does not validate upgrades,
# backup/restore, production hardening, or hospital-specific configuration.
#
# CI-only stack: see docker-compose.ci.yml (Mailhog, internal JWT issuer, etc.).
# This is not a production or hospital reference configuration.
#
# Triggers: weekly schedule (limits Actions minutes), manual workflow_dispatch,
# and pull requests that touch deployment-related paths only. For other PRs,
# run this workflow manually from the branch (Actions → Deployment smoke test).

name: Deployment smoke test

on:
  schedule:
    # Weekly Monday 03:00 UTC — adjust time/day as needed.
    - cron: "0 3 * * 1"
  workflow_dispatch:
    inputs:
      image_tag:
        description: >
          GHCR tag for ghcr.io/fli-iam/shanoir-ng/* images. Use auto to select
          the newest complete NG_vX.Y.Z release image set, or pass an explicit
          published tag such as NG_v2.10.0. Development builds, when published,
          are tagged by commit SHA rather than by the develop branch name. Do
          not rely on latest; it is not a complete stack tag.
        required: false
        default: "auto"
        type: string
  pull_request:
    branches: [develop, master]
    paths:
      - "docker-compose.yml"
      - "docker-compose.ci.yml"
      - "bootstrap.sh"
      - ".github/workflows/deployment-test.yaml"
      - ".github/workflows/hospital-*.yml"
      - ".github/scripts/**"
      - "hospital-validation/**"

concurrency:
  group: deployment-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deployment-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    permissions:
      contents: read
      packages: read

    env:
      COMPOSE_FILE: "docker-compose.yml:docker-compose.ci.yml"
      # Tracked .env uses SHANOIR_MIGRATION=dev, which skips database-migrations
      # init procedures (stored procedures, etc.). CI must run like a real deploy.
      SHANOIR_MIGRATION: auto

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # Manifest inspect / pulls to ghcr.io are more reliable authenticated.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve SHANOIR_IMAGE_TAG
        shell: bash
        run: |
          set -euo pipefail

          TAG='${{ github.event.inputs.image_tag }}'
          TAG="${TAG:-auto}"

          images=(
            keycloak-database keycloak database database-migrations users studies
            import datasets preclinical nifti-conversion solr nginx
          )

          full_stack_present() {
            local t="$1"
            local img
            for img in "${images[@]}"; do
              ref="ghcr.io/fli-iam/shanoir-ng/${img}:${t}"
              if ! docker manifest inspect "${ref}" >/dev/null 2>&1; then
                return 1
              fi
            done
            return 0
          }

          if [ "${TAG}" = "auto" ]; then
            echo "Resolving newest complete NG_vX.Y.Z image set..."
            while IFS= read -r candidate; do
              if full_stack_present "${candidate}"; then
                echo "Using image tag: ${candidate}"
                echo "SHANOIR_IMAGE_TAG=${candidate}" >> "$GITHUB_ENV"
                exit 0
              fi
              echo "Skipping incomplete image tag: ${candidate}"
            done < <(
              git ls-remote --tags --refs https://github.com/fli-iam/shanoir-ng.git 'NG_v*' \
                | awk '{print $2}' \
                | sed 's#refs/tags/##' \
                | grep -E '^NG_v[0-9]+\.[0-9]+\.[0-9]+$' \
                | sort -Vr
            )

            echo "ERROR: Could not find a complete NG_vX.Y.Z image set in GHCR." >&2
            exit 1
          fi

          if full_stack_present "${TAG}"; then
            echo "Using image tag: ${TAG}"
            echo "SHANOIR_IMAGE_TAG=${TAG}" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "WARN: tag '${TAG}' is missing one or more required images."

          echo "ERROR: Could not find a GHCR tag with all required microservice images." >&2
          echo "Set workflow_dispatch image_tag explicitly (e.g. NG_v2.10.0 or a published commit SHA)." >&2
          exit 1

      - name: Configure /etc/hosts
        run: |
          sudo sh -c 'echo "127.0.0.1 shanoir-ng-nginx viewer" >> /etc/hosts'

      - name: Validate image tag availability
        shell: bash
        run: |
          set -euo pipefail
          TAG="${SHANOIR_IMAGE_TAG}"

          images=(
            keycloak-database
            keycloak
            database
            database-migrations
            users
            studies
            import
            datasets
            preclinical
            nifti-conversion
            solr
            nginx
          )

          missing=0
          for img in "${images[@]}"; do
            ref="ghcr.io/fli-iam/shanoir-ng/${img}:${TAG}"
            if docker manifest inspect "$ref" >/dev/null 2>&1; then
              echo "OK: $ref"
            else
              echo "MISSING: $ref"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "ERROR: Some required images are missing for tag ${TAG}"
            exit 1
          fi

      - name: Pull published images
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do;
            if docker compose pull; then
              exit 0
            fi
            echo "Pull failed on attempt ${attempt}, retrying..."
            sleep $((attempt * 20 ))
          done
          echo "Pulling failed after 3 attempts" >&2
          exit 1


      - name: Bootstrap installation
        run: bash ./bootstrap.sh --clean --no-build --no-dcm4chee

      - name: Debug container state
        if: failure()
        run: |
          echo "--- Container statuses ---"
          docker compose ps --all
          echo ""
          echo "--- users container config (non-secret) ---"
          docker exec users sh -c 'echo "SMTP_HOST=$SHANOIR_SMTP_HOST SMTP_PORT=$SHANOIR_SMTP_PORT MIGRATION=$SHANOIR_MIGRATION LOG_LEVEL=$SHANOIR_CONSOLE_LOG_LEVEL"' 2>/dev/null || echo "(exec failed)"
          echo ""
          echo "--- users container logs (last 50 lines) ---"
          docker logs --tail=50 users 2>&1 || echo "(no logs)"
          echo ""
          echo "--- users container inspect (State) ---"
          docker inspect --format='Status={{.State.Status}} Running={{.State.Running}} OOMKilled={{.State.OOMKilled}} ExitCode={{.State.ExitCode}} Pid={{.State.Pid}}' users 2>/dev/null || echo "(inspect failed)"
          echo ""
          echo "--- system memory ---"
          free -h
          echo ""
          echo "--- docker stats (no-stream) ---"
          docker stats --no-stream --format "table {{.Name}}\t{{.MemUsage}}\t{{.CPUPerc}}" 2>/dev/null | head -20

      - name: Wait for microservices
        run: |
          bash .github/scripts/helpers.sh wait_for_log keycloak 'Keycloak .* started in' 300
          for ms in users studies datasets import preclinical; do
            bash .github/scripts/helpers.sh wait_for_log "$ms" 'Started .* in' 300
          done
          bash .github/scripts/helpers.sh wait_for_url https://shanoir-ng-nginx/ 180

      - name: Create Keycloak admin user
        run: bash .github/scripts/create-keycloak-user.sh

      - name: Smoke tests
        run: bash .github/scripts/helpers.sh smoke_tests

      - name: Functional tests
        run: bash .github/scripts/functional-tests.sh

      - name: Restart stack and validate persistence
        run: |
          docker compose restart
          sleep 30
          # Do not rely on wait_for_log here: Docker keeps pre-restart logs, so patterns
          # like "Started ... in" match immediately while services are still booting.
          bash .github/scripts/helpers.sh wait_for_shanoir_password_token 240
          bash .github/scripts/helpers.sh wait_for_url https://shanoir-ng-nginx/ 180
          bash .github/scripts/post-restart-validation.sh

      - name: Dump logs on failure
        if: failure()
        run: |
          mkdir -p /tmp/shanoir-logs
          docker compose logs --no-color > /tmp/shanoir-logs/compose.log 2>&1
          docker compose ps --all > /tmp/shanoir-logs/ps.log 2>&1

      - name: Upload logs on failure
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: deployment-logs
          path: /tmp/shanoir-logs/
          retention-days: 7

      - name: Teardown
        if: always()
        run: docker compose down -v
